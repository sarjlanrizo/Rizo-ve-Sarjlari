<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şarj Aleti Stok Takip</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s, opacity 0.2s;
        }
        .btn:active {
            opacity: 0.9;
        }
        .btn-add {
            background-color: #3498db;
            color: white;
        }
        .btn-remove {
            background-color: #e74c3c;
            color: white;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .btn-group .btn {
            flex: 1;
        }
        .stock-section {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .stock-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .stock-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            gap: 10px;
        }
        /* Görsel Kutusu Tasarımı */
        .image-box {
            width: 60px;
            height: 60px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            background-color: #fff;
            overflow: hidden;
            flex-shrink: 0;
            transition: border-color 0.2s;
        }
        .image-box:active {
            border-color: #3498db;
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-box span {
            font-size: 10px;
            color: #7f8c8d;
            text-align: center;
            pointer-events: none;
            padding: 2px;
        }
        .stock-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stock-name {
            font-weight: 600;
            font-size: 15px;
            color: #2c3e50;
            word-break: break-all;
        }
        .stock-count {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .count-val {
            font-weight: bold;
            color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Şarj Aleti Stok Takip</h2>

    <input type="text" id="urun-adi" placeholder="Ürün Adı Ara veya Girin..." list="urun-onerileri" autocomplete="off">
    
    <datalist id="urun-onerileri"></datalist>

    <input type="number" id="urun-adet" placeholder="Adet" min="1" value="1">

    <div class="btn-group">
        <button class="btn btn-add" onclick="stokGuncelle(true)">Stok Ekle</button>
        <button class="btn btn-remove" onclick="stokGuncelle(false)">Stok Sat / Çıkar</button>
    </div>

    <div class="stock-section">
        <div class="stock-title">Eldeki Mevcut Stok</div>
        <div id="stok-listesi">Yükleniyor...</div>
    </div>
</div>

<script>
    window.onload = function() {
        stokListele();
    };

    // Stok Ekle / Sat (Çıkar)
    function stokGuncelle(ekle) {
        const urun = document.getElementById('urun-adi').value.trim();
        const adetInput = document.getElementById('urun-adet');
        const adet = parseInt(adetInput.value);

        if (!urun) {
            alert("Lütfen ürün adı girin!");
            return;
        }
        if (isNaN(adet) || adet <= 0) {
            alert("Lütfen geçerli bir adet girin!");
            return;
        }

        let stoklar = JSON.parse(localStorage.getItem('sarj_stok_v2')) || {};
        
        if (!stoklar[urun]) {
            // İlk kez ekleniyorsa, görseli boş tut
            stoklar[urun] = { adet: 0, gorsel: "" };
        }

        let mevcutAdet = stoklar[urun].adet;

        if (ekle) {
            stoklar[urun].adet = mevcutAdet + adet;
            // Ekleme yaparken eski görsel varsa dokunma, yoksa "Görsel Ekle" yazısını koru
            if(!stoklar[urun].gorsel) stoklar[urun].gorsel = ""; 
            alert(`${adet} adet eklendi.`);
        } else {
            if (mevcutAdet < adet) {
                alert(`Yetersiz stok! Elde sadece ${mevcutAdet} adet var.`);
                return;
            } else {
                stoklar[urun].adet = mevcutAdet - adet;
                if (stoklar[urun].adet === 0) {
                    // Tamamen silmek yerine 0 adet olarak tut, görsel gitmesin
                    stoklar[urun].adet = 0;
                }
                alert(`${adet} adet satıldı / düşüldü.`);
            }
        }

        localStorage.setItem('sarj_stok_v2', JSON.stringify(stoklar));
        
        // Alanları temizle
        document.getElementById('urun-adi').value = "";
        adetInput.value = "1";
        
        stokListele();
    }

    // --- KRİTİK DÜZELTME BURADA ---
    // Her ürün için kendine özel, benzersiz bir dosya giriş elemanı kullanıyoruz.
    function triggerGorselSec(urunKey) {
        // Zaten bir dosya seçici varsa temizle (aynı ürüne 2. kez tıklanırsa)
        const oldInput = document.getElementById(`temp-file-input-${urunKey}`);
        if (oldInput) oldInput.remove();

        // Ürüne özel geçici bir input oluştur
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment'; 
        input.id = `temp-file-input-${urunKey}`; // Benzersiz ID
        input.style.display = 'none'; // Ekranda görünmesin

        // Dosya seçildiğinde çalışacak olay
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;

            // Dosya çok büyükse hafızayı yormasın diye okuma işlemi başlatılıyor
            const reader = new FileReader();
            
            // Okuma tamamlandığında
            reader.onload = function(event) {
                const base64Image = event.target.result; // Fotoğrafı metin formatına çevirdik
                
                // Veriyi çek, güncelle ve kaydet
                let stoklar = JSON.parse(localStorage.getItem('sarj_stok_v2')) || {};
                
                // Güvenlik kontrolü: Ürün hala var mı?
                if (stoklar[urunKey]) {
                    stoklar[urunKey].gorsel = base64Image;
                    localStorage.setItem('sarj_stok_v2', JSON.stringify(stoklar));
                    
                    // Görseli sadece ekranda güncelle (tüm listeyi yenileme, daha hızlı)
                    stokListele(); 
                }
                
                // Geçici input'u temizle (hafıza için)
                input.remove();
            };
            
            // Dosyayı oku
            reader.readAsDataURL(file);
        };

        // Oluşturulan input'u sayfaya ekle ve tıkla
        document.body.appendChild(input);
        input.click();
    }

    // Stokları Listeleme
    function stokListele() {
        const stoklar = JSON.parse(localStorage.getItem('sarj_stok_v2')) || {};
        const listeAlani = document.getElementById('stok-listesi');
        const oneriAlani = document.getElementById('urun-onerileri');
        
        listeAlani.innerHTML = "";
        oneriAlani.innerHTML = ""; 

        const urunler = Object.keys(stoklar);

        if (urunler.length === 0) {
            listeAlani.innerHTML = "<p style='color: #888; text-align: center;'>Stokta hiç ürün bulunmuyor.</p>";
            return;
        }

        urunler.forEach(urun => {
            const urunVerisi = stoklar[urun];
            
            // Arama öneri listesine ekle
            const option = document.createElement('option');
            option.value = urun;
            oneriAlani.appendChild(option);

            // Stok listesini oluştur
            const item = document.createElement('div');
            item.className = 'stock-item';

            let gorselIcerik = `<span>Görsel Ekle</span>`;
            
            // Görsel varsa önizlemeyi koy, yoksa "Ekle" yazısını koru
            if (urunVerisi.gorsel) {
                gorselIcerik = `<img src="${urunVerisi.gorsel}" alt="${urun}">`;
            } else {
                // Eğer veri tabanında görsel boş string ise, ekrana "Görsel Ekle" yaz
                gorselIcerik = `<span>Görsel Ekle</span>`;
            }

            item.innerHTML = `
                <div class="image-box" onclick="triggerGorselSec('${urun}')">
                    ${gorselIcerik}
                </div>
                <div class="stock-details">
                    <span class="stock-name">${urun}</span>
                    <span class="stock-count">Mevcut: <span class="count-val">${urunVerisi.adet} Adet</span></span>
                </div>
            `;
            listeAlani.appendChild(item);
        });
    }
</script>

</body>
</html>
