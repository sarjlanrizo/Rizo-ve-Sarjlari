<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şarj Aleti Stok Takip</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s, opacity 0.2s;
        }
        .btn:active {
            opacity: 0.9;
        }
        .btn-scan {
            background-color: #2ecc71;
            color: white;
        }
        .btn-add {
            background-color: #3498db;
            color: white;
        }
        .btn-remove {
            background-color: #e74c3c;
            color: white;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .btn-group .btn {
            flex: 1;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            border: none !important;
        }
        .stock-section {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .stock-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .stock-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            gap: 10px;
        }
        /* Görsel Kutusu Tasarımı */
        .image-box {
            width: 60px;
            height: 60px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            background-color: #fff;
            overflow: hidden;
            flex-shrink: 0;
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-box span {
            font-size: 10px;
            color: #7f8c8d;
            text-align: center;
            pointer-events: none;
            padding: 2px;
        }
        .stock-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stock-name {
            font-weight: 600;
            font-size: 15px;
            color: #2c3e50;
            word-break: break-all;
        }
        .stock-count {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .count-val {
            font-weight: bold;
            color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Şarj Aleti Stok Takip</h2>

    <div id="reader"></div>
    
    <button class="btn btn-scan" id="scan-btn" onclick="startScanner()">Kamera ile Barkod Tara</button>

    <input type="text" id="urun-adi" placeholder="Ürün Adı veya Barkod No">
    <input type="number" id="urun-adet" placeholder="Adet" min="1" value="1">

    <div class="btn-group">
        <button class="btn btn-add" onclick="stokGuncelle(true)">Stok Ekle</button>
        <button class="btn btn-remove" onclick="stokGuncelle(false)">Stok Sat / Çıkar</button>
    </div>

    <div class="stock-section">
        <div class="stock-title">Eldeki Mevcut Stok</div>
        <div id="stok-listesi">Yükleniyor...</div>
    </div>
</div>

<script>
    let html5QrcodeScanner = null;

    window.onload = function() {
        stokListele();
    };

    // Kamerayı Başlatma
    function startScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
        }

        document.getElementById('scan-btn').innerText = "Kamera Hazırlanıyor...";

        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 150 },
            rememberLastUsedCamera: true
        });

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // Başarılı Barkod Okuma
    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('urun-adi').value = decodedText;
        
        if (navigator.vibrate) {
            navigator.vibrate(100);
        }

        html5QrcodeScanner.clear().then(() => {
            document.getElementById('scan-btn').innerText = "Kamera ile Barkod Tara";
        }).catch(err => {
            console.error("Tarayıcı kapatılamadı:", err);
        });
    }

    function onScanFailure(error) {
        console.warn(`Tarama hatası: ${error}`);
    }

    // Stok Ekle / Sat (Çıkar)
    function stokGuncelle(ekle) {
        const urun = document.getElementById('urun-adi').value.trim();
        const adetInput = document.getElementById('urun-adet');
        const adet = parseInt(adetInput.value);

        if (!urun) {
            alert("Lütfen ürün adı girin veya barkod taratın!");
            return;
        }
        if (isNaN(adet) || adet <= 0) {
            alert("Lütfen geçerli bir adet girin!");
            return;
        }

        let stoklar = JSON.parse(localStorage.getItem('sarj_stok_v2')) || {};
        
        // Eğer ürün ilk kez ekleniyorsa obje olarak oluştur (hem adet hem görsel tutabilmek için)
        if (!stoklar[urun]) {
            stoklar[urun] = { adet: 0, gorsel: "" };
        }

        let mevcutAdet = stoklar[urun].adet;

        if (ekle) {
            stoklar[urun].adet = mevcutAdet + adet;
            alert(`${adet} adet eklendi.`);
        } else {
            if (mevcutAdet < adet) {
                alert(`Yetersiz stok! Elde sadece ${mevcutAdet} adet var.`);
                return;
            } else {
                stoklar[urun].adet = mevcutAdet - adet;
                if (stoklar[urun].adet === 0) {
                    // Stok sıfırlanırsa görseli kaybetmemek için sadece adeti 0 yapıyoruz.
                    // İstersen tamamen silmek için: delete stoklar[urun];
                    stoklar[urun].adet = 0;
                }
                alert(`${adet} adet satıldı / düşüldü.`);
            }
        }

        localStorage.setItem('sarj_stok_v2', JSON.stringify(stoklar));
        
        document.getElementById('urun-adi').value = "";
        adetInput.value = "1";
        
        stokListele();
    }

    // Görsel Seçme Tetikleyici
    function triggerGorselSec(urunKey) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        // Telefondan doğrudan kamerayı açmaya öncelik vermesi için:
        input.capture = 'environment'; 

        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result;
                
                // Görseli ilgili ürüne kaydet
                let stoklar = JSON.parse(localStorage.getItem('sarj_stok_v2')) || {};
                if (stoklar[urunKey]) {
                    stoklar[urunKey].gorsel = base64Image;
                    localStorage.setItem('sarj_stok_v2', JSON.stringify(stoklar));
                    stokListele(); // Listeyi yenile
                }
            };
            // Telefon hafızasını yormamak için görsel boyutunu optimize edip okur
            reader.readAsDataURL(file);
        };
        input.click();
    }

    // Stokları Listeleme
    function stokListele() {
        const stoklar = JSON.parse(localStorage.getItem('sarj_stok_v2')) || {};
        const listeAlani = document.getElementById('stok-listesi');
        
        listeAlani.innerHTML = "";

        const urunler = Object.keys(stoklar);

        if (urunler.length === 0) {
            listeAlani.innerHTML = "<p style='color: #888; text-align: center;'>Stokta hiç ürün bulunmuyor.</p>";
            return;
        }

        urunler.forEach(urun => {
            const urunVerisi = stoklar[urun];
            const item = document.createElement('div');
            item.className = 'stock-item';

            // Görsel alanı içeriği (Görsel yoksa "Görsel Seç" yazısı gösterilir)
            let gorselIcerik = `<span>Görsel Ekle</span>`;
            if (urunVerisi.gorsel) {
                gorselIcerik = `<img src="${urunVerisi.gorsel}" alt="${urun}">`;
            }

            item.innerHTML = `
                <div class="image-box" onclick="triggerGorselSec('${urun}')">
                    ${gorselIcerik}
                </div>
                <div class="stock-details">
                    <span class="stock-name">${urun}</span>
                    <span class="stock-count">Mevcut: <span class="count-val">${urunVerisi.adet} Adet</span></span>
                </div>
            `;
            listeAlani.appendChild(item);
        });
    }
</script>

</body>
</html>
