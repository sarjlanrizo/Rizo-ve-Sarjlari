<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şarj Aleti Stok Takip</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }
        .btn-scan {
            background-color: #2ecc71;
            color: white;
        }
        .btn-add {
            background-color: #3498db;
            color: white;
        }
        .btn-remove {
            background-color: #e74c3c;
            color: white;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-group .btn {
            flex: 1;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            border: none !important;
        }
        .stock-section {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .stock-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .stock-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 5px;
        }
        .stock-item span {
            font-size: 15px;
        }
        .stock-item .count {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Şarj Aleti Stok Takip</h2>

    <div id="reader"></div>
    
    <button class="btn btn-scan" id="scan-btn" onclick="startScanner()">Kamera ile Barkod Tara</button>

    <input type="text" id="urun-adi" placeholder="Ürün Adı veya Barkod No">
    <input type="number" id="urun-adet" placeholder="Adet" min="1" value="1">

    <div class="btn-group">
        <button class="btn btn-add" onclick="stokGuncelle(true)">Stok Ekle</button>
        <button class="btn btn-remove" onclick="stokGuncelle(false)">Stok Çıkar</button>
    </div>

    <div class="stock-section">
        <div class="stock-title">Eldeki Mevcut Stok</div>
        <div id="stok-listesi">Yükleniyor...</div>
    </div>
</div>

<script>
    let html5QrcodeScanner = null;

    // Sayfa yüklendiğinde mevcut stokları listele
    window.onload = function() {
        stokListele();
    };

    // Kamerayı Başlatma Fonksiyonu
    function startScanner() {
        // Eğer zaten açıksa kapatıp tekrar açalım temizlik için
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
        }

        document.getElementById('scan-btn').innerText = "Kamera Hazırlanıyor...";

        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 150 },
            rememberLastUsedCamera: true
        });

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // Başarılı Tarama Durumunda
    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('urun-adi').value = decodedText;
        
        // Telefonun hafifçe titremesini sağla (kullanıcı deneyimi için)
        if (navigator.vibrate) {
            navigator.vibrate(100);
        }

        // Taramayı durdur (Sürekli tarayıp ekranı doldurmasın diye)
        html5QrcodeScanner.clear().then(() => {
            document.getElementById('scan-btn').innerText = "Kamera ile Barkod Tara";
        }).catch(err => {
            console.error("Tarayıcı kapatılamadı:", err);
        });
    }

    function onScanFailure(error) {
        // Hataları konsola yaz ama ekranda kullanıcıyı rahatsız etmesin
        console.warn(`Tarama hatası: ${error}`);
    }

    // Stok Ekle / Stok Çıkar Mantığı
    function stokGuncelle(ekle) {
        const urun = document.getElementById('urun-adi').value.trim();
        const adetInput = document.getElementById('urun-adet');
        const adet = parseInt(adetInput.value);

        if (!urun) {
            alert("Lütfen ürün adı girin veya barkod taratın!");
            return;
        }
        if (isNaN(adet) || adet <= 0) {
            alert("Lütfen geçerli bir adet girin!");
            return;
        }

        // Mevcut stoğu localStorage'dan çek
        let stoklar = JSON.parse(localStorage.getItem('sarj_stok')) || {};
        let mevcutAdet = stoklar[urun] || 0;

        if (ekle) {
            stoklar[urun] = mevcutAdet + adet;
            alert(`${adet} adet eklendi.`);
        } else {
            if (mevcutAdet < adet) {
                alert(`Yetersiz stok! Elde sadece ${mevcutAdet} adet var.`);
                return;
            } else {
                stoklar[urun] = mevcutAdet - adet;
                if (stoklar[urun] === 0) {
                    delete stoklar[urun]; // Stok sıfırlandıysa listeden temizle
                }
                alert(`${adet} adet düşüldü.`);
            }
        }

        // Güncel veriyi kaydet ve listeyi güncelle
        localStorage.setItem('sarj_stok', JSON.stringify(stoklar));
        
        // Formu temizle
        document.getElementById('urun-adi').value = "";
        adetInput.value = "1";
        
        stokListele();
    }

    // Stokları Listeleme Fonksiyonu
    function stokListele() {
        const stoklar = JSON.parse(localStorage.getItem('sarj_stok')) || {};
        const listeAlani = document.getElementById('stok-listesi');
        
        listeAlani.innerHTML = "";

        const urunler = Object.keys(stoklar);

        if (urunler.length === 0) {
            listeAlani.innerHTML = "<p style='color: #888; text-align: center;'>Stokta hiç ürün bulunmuyor.</p>";
            return;
        }

        urunler.forEach(urun => {
            const item = document.createElement('div');
            item.className = 'stock-item';
            item.innerHTML = `
                <span>${urun}</span>
                <span class="count">${stoklar[urun]} Adet</span>
            `;
            listeAlani.appendChild(item);
        });
    }
</script>

</body>
</html>
