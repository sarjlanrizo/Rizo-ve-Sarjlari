<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şarj Aleti Stok Takip</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
            font-size: 20px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-add {
            background-color: #3498db;
            color: white;
        }
        .btn-remove {
            background-color: #e74c3c;
            color: white;
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
            color: #7f8c8d;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fafafa;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
            background-color: #fff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        .btn-group .btn {
            flex: 1;
            margin-bottom: 0;
        }
        .stock-section {
            margin-top: 25px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .stock-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            gap: 10px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .stock-item:hover, .stock-item:active {
            background-color: #f1f5f9;
            border-color: #3498db;
        }
        /* Görsel Kutusu */
        .image-box {
            width: 60px;
            height: 60px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            background-color: #fff;
            overflow: hidden;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .image-box:hover {
            border-color: #3498db;
            background-color: #f8fafc;
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-box span {
            font-size: 9px;
            color: #94a3b8;
            text-align: center;
            font-weight: bold;
            pointer-events: none;
            line-height: 1.1;
        }
        .stock-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stock-name {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
            word-break: break-all;
        }
        .stock-count {
            font-size: 13px;
            color: #64748b;
            margin-top: 3px;
        }
        .count-val {
            font-weight: bold;
            color: #2ecc71;
        }
        /* Hızlı Ekle/Çıkar Butonları */
        .quick-actions {
            display: flex;
            gap: 5px;
        }
        .btn-quick {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background-color: #fff;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
            transition: all 0.1s;
        }
        .btn-quick:active {
            background-color: #e2e8f0;
            transform: scale(0.95);
        }
        .btn-quick.add {
            color: #3498db;
            border-color: #93c5fd;
        }
        .btn-quick.add:active {
            background-color: #dbeafe;
        }
        .btn-quick.sub {
            color: #e74c3c;
            border-color: #fca5a5;
        }
        .btn-quick.sub:active {
            background-color: #fee2e2;
        }
        .hint-text {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Şarj Aleti Stok Takip</h2>
    <p class="hint-text">Öneri almak veya işlem yapmak için listedeki bir ürüne dokunabilirsiniz.</p>

    <div class="input-group">
        <label for="urun-adi">Ürün Adı / Model</label>
        <input type="text" id="urun-adi" placeholder="Ürün adını girin veya seçin..." list="urun-onerileri" autocomplete="off">
        <datalist id="urun-onerileri"></datalist>
    </div>

    <div class="input-group">
        <label for="urun-adet">İşlem Yapılacak Adet</label>
        <input type="number" id="urun-adet" placeholder="Adet" min="1" value="1">
    </div>

    <div class="btn-group">
        <button class="btn btn-add" onclick="stokGuncelle(true)">Stok Ekle</button>
        <button class="btn btn-remove" onclick="stokGuncelle(false)">Stok Sat / Çıkar</button>
    </div>

    <div class="stock-section">
        <div class="stock-title">
            <span>Eldeki Mevcut Stok</span>
            <span style="font-size: 12px; font-weight: normal; color: #94a3b8;" id="total-types">0 Çeşit</span>
        </div>
        <div id="stok-listesi">Yükleniyor...</div>
    </div>
</div>

<script>
    window.onload = function() {
        stokListele();
    };

    // Stoğa tıklayınca formu o ürünle doldurur
    function formuDoldur(urunAdi) {
        document.getElementById('urun-adi').value = urunAdi;
        document.getElementById('urun-adet').focus();
    }

    // Stok Ekle / Sat (Çıkar) Ana Fonksiyonu
    function stokGuncelle(ekle, belirliUrun = null, belirliAdet = null) {
        const urun = belirliUrun ? belirliUrun.trim() : document.getElementById('urun-adi').value.trim();
        const adet = belirliAdet ? parseInt(belirliAdet) : parseInt(document.getElementById('urun-adet').value);

        if (!urun) {
            alert("Lütfen bir ürün adı girin!");
            return;
        }
        if (isNaN(adet) || adet <= 0) {
            alert("Lütfen geçerli bir adet girin!");
            return;
        }

        let stoklar = JSON.parse(localStorage.getItem('sarj_stok_v3')) || {};
        
        if (!stoklar[urun]) {
            stoklar[urun] = { adet: 0, gorsel: "" };
        }

        let mevcutAdet = stoklar[urun].adet || 0;

        if (ekle) {
            stoklar[urun].adet = mevcutAdet + adet;
            if (!belirliUrun) alert(`${adet} adet '${urun}' eklendi.`);
        } else {
            if (mevcutAdet < adet) {
                alert(`Yetersiz stok! '${urun}' için elde sadece ${mevcutAdet} adet var.`);
                return;
            } else {
                stoklar[urun].adet = mevcutAdet - adet;
                if (!belirliUrun) alert(`${adet} adet '${urun}' satıldı/düşüldü.`);
            }
        }

        localStorage.setItem('sarj_stok_v3', JSON.stringify(stoklar));
        
        if (!belirliUrun) {
            document.getElementById('urun-adi').value = "";
            document.getElementById('urun-adet').value = "1";
        }
        
        stokListele();
    }

    // Satırdaki +/- butonları için hızlı stok güncelleme
    function hizliGuncelle(e, urun, ekle) {
        e.stopPropagation(); // Satır tıklama olayını engeller
        stokGuncelle(ekle, urun, 1);
    }

    // Fotoğraf Seçme ve Sıkıştırma Çözümü
    function triggerGorselSec(e, urunKey) {
        e.stopPropagation(); // Satır tıklama olayını engeller

        const oldInput = document.getElementById(`temp-file-${urunKey}`);
        if (oldInput) oldInput.remove();

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.id = `temp-file-${urunKey}`;
        input.style.display = 'none';

        input.onchange = event => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(fEvent) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Görseli max 300px genişliğe sıkıştırıp hafıza sınırını aşmasını engelliyoruz
                    const max_size = 300;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                    let stoklar = JSON.parse(localStorage.getItem('sarj_stok_v3')) || {};
                    if (stoklar[urunKey]) {
                        stoklar[urunKey].gorsel = compressedBase64;
                        localStorage.setItem('sarj_stok_v3', JSON.stringify(stoklar));
                        stokListele();
                    }
                };
                img.src = fEvent.target.result;
            };
            reader.readAsDataURL(file);
        };

        document.body.appendChild(input);
        input.click();
    }

    // Stokları Listeleme
    function stokListele() {
        const stoklar = JSON.parse(localStorage.getItem('sarj_stok_v3')) || {};
        const listeAlani = document.getElementById('stok-listesi');
        const oneriAlani = document.getElementById('urun-onerileri');
        
        listeAlani.innerHTML = "";
        oneriAlani.innerHTML = ""; 

        const urunler = Object.keys(stoklar);
        document.getElementById('total-types').innerText = urunler.length + " Çeşit";

        if (urunler.length === 0) {
            listeAlani.innerHTML = "<p style='color: #888; text-align: center; padding: 20px 0;'>Stokta hiç ürün bulunmuyor.</p>";
            return;
        }

        urunler.forEach(urun => {
            const urunVerisi = stoklar[urun];
            
            const option = document.createElement('option');
            option.value = urun;
            oneriAlani.appendChild(option);

            const item = document.createElement('div');
            item.className = 'stock-item';
            item.setAttribute('onclick', `formuDoldur('${urun.replace(/'/g, "\\'")}')`);

            let gorselIcerik = `<span>Görsel<br>Ekle</span>`;
            if (urunVerisi.gorsel) {
                gorselIcerik = `<img src="${urunVerisi.gorsel}" alt="${urun}">`;
            }

            item.innerHTML = `
                <div class="image-box" onclick="triggerGorselSec(event, '${urun.replace(/'/g, "\\'")}')">
                    ${gorselIcerik}
                </div>
                <div class="stock-details">
                    <span class="stock-name">${urun}</span>
                    <span class="stock-count">Mevcut: <span class="count-val">${urunVerisi.adet} Adet</span></span>
                </div>
                <div class="quick-actions">
                    <button class="btn-quick sub" onclick="hizliGuncelle(event, '${urun.replace(/'/g, "\\'")}', false)">-</button>
                    <button class="btn-quick add" onclick="hizliGuncelle(event, '${urun.replace(/'/g, "\\'")}', true)">+</button>
                </div>
            `;
            listeAlani.appendChild(item);
        });
    }
</script>

</body>
</html>
